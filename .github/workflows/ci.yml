name: CI/CD Pipeline — Nginx

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nginx-cicd-tp

jobs:

  # ─── JOB 1 : Build & Test ────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier la présence des fichiers essentiels
        run: |
          echo "Vérification des fichiers..."
          test -f Dockerfile   && echo "✅ Dockerfile trouvé"   || (echo "❌ Dockerfile manquant" && exit 1)
          test -f nginx.conf   && echo "✅ nginx.conf trouvé"   || (echo "❌ nginx.conf manquant" && exit 1)
          test -f index.html   && echo "✅ index.html trouvé"   || (echo "❌ index.html manquant" && exit 1)

      - name: Build de l'image Docker
        run: docker build -t nginx-ci-demo:${{ github.sha }} .

      - name: Tester la configuration Nginx
        run: docker run --rm nginx-ci-demo:${{ github.sha }} nginx -t

      - name: Lancer le conteneur
        run: |
          docker run -d --name nginx-test -p 8080:80 nginx-ci-demo:${{ github.sha }}
          sleep 3

      - name: Tester la réponse HTTP sur /
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Status HTTP: $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ Le serveur ne répond pas en HTTP" && exit 1)
          echo "✅ Le serveur répond bien en HTTP 200"

      - name: Tester l'endpoint /health
        run: |
          HEALTH=$(curl -s http://localhost:8080/health)
          echo "Réponse /health: $HEALTH"
          [ "$HEALTH" = "OK" ] || (echo "❌ /health ne répond pas correctement" && exit 1)
          echo "✅ /health répond : OK"

      - name: Vérifier qu'aucun secret n'est dans les logs
        run: |
          echo "Vérification : aucun secret en clair dans le code..."
          ! grep -rE "(password|secret|token|api_key)\s*=\s*['\"][^'\"]{4,}" . \
            --include="*.conf" --include="*.html" --include="*.yml" \
            --exclude-dir=".git" \
            --exclude-dir=".github" \
          && echo "✅ Aucun secret détecté en clair" || (echo "❌ Secret potentiel détecté !" && exit 1)

      - name: Arrêter le conteneur
        if: always()
        run: docker rm -f nginx-test || true

  # ─── JOB 2 : Publish vers GitHub Container Registry ─────────
  publish:
    name: Publier l'image (Registry)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push avec tag SHA
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag  ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image publiée : ${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # ─── JOB 3 : Validation manuelle avant déploiement prod ─────
  deploy-prod:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production
      url: https://github.com/${{ github.repository }}

    steps:
      - name: Déploiement simulé en production
        run: |
          echo "🚀 Déploiement en production approuvé !"
          echo "Image utilisée : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Commit SHA     : ${{ github.sha }}"
          echo "Déployé par    : ${{ github.actor }}"
          echo "✅ Production mise à jour avec succès."