name: CI/CD Pipeline — Nginx

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/mekkinos/nginx-cicd-tp

# ─────────────────────────────────────────────
jobs:

# ─── 1. BUILD + TEST ─────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f Dockerfile && echo "✅ Dockerfile"
          test -f nginx.conf && echo "✅ nginx.conf"
          test -f index.html && echo "✅ index.html"

      - name: Build image (test)
        run: docker build -t nginx-ci:${{ github.sha }} .

      - name: Test nginx config
        run: docker run --rm nginx-ci:${{ github.sha }} nginx -t

      - name: Run container
        run: |
          docker run -d --name nginx-test -p 8080:80 nginx-ci:${{ github.sha }}
          sleep 3

      - name: HTTP test /
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Test /health
        run: |
          RESPONSE=$(curl -s http://localhost:8080/health)
          echo "$RESPONSE"
          [ "$RESPONSE" = "OK" ]

      - name: Secret scan
        run: |
          echo "🔍 Secret scan..."

          if grep -rE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{4,}" . \
            --include="*.conf" \
            --include="*.html" \
            --include="*.yml" \
            --exclude-dir=".git" \
            --exclude-dir=".github"
          then
            echo "❌ Secret potentiel détecté"
            exit 1
          else
            echo "✅ Aucun secret en clair détecté"
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f nginx-test || true


# ─── 2. BUILD & PUSH GHCR ─────────────────────
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest


# ─── 3. PRODUCTION DEPLOY (MANUAL APPROVAL) ───
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production

    steps:
      - name: Deploy (simulated)
        run: |
          echo "🚀 DEPLOY APPROVED"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"